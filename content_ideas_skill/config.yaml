# content-ideas-skill: конфигурация

# === Пути к зависимым скилам ===
paths:
  wishlibrarian: "C:\\Users\\kfigh\\wish_librarian"
  wishcoach: "C:\\Users\\kfigh\\coach_agent"
  publisher: "C:\\Users\\kfigh\\publisher_skill"
  seo_advisor: "C:\\Users\\kfigh\\seo-advisor-skill"
  expert_reviews_hub: "C:\\Users\\kfigh\\expert-reviews-hub"

# === VK API ===
vk:
  # Имя env-переменной (фактический токен читается из .env других скилов,
  # см. ENV_FALLBACKS в fetch_vk_posts.py и lib/llm_client.py)
  token_env: "VK_ACCESS_TOKEN"
  group_token_env: "VK_GROUP_TOKEN"
  rate_limit_per_sec: 3
  api_version: "5.131"

# === LLM ===
llm:
  # Провайдер: claude | yandex | gigachat | auto
  # "auto" = определить автоматически (см. lib/llm_client.py:LLMClient._detect_provider)
  provider: "auto"
  model: null  # null = дефолт провайдера
  max_tokens: 4000
  temperature: 0.8

  # === Промпты (можно переопределить) ===
  # Поддерживают {placeholders}: {count}, {theme}, {source}, {target}, {rubric}
  prompts:
    # System — это «личность» ассистента, инструктаж
    system: |
      Ты — контент-стратег Лаборатории желаний (ЛЖ) — психологического сообщества для женщин 25-45 лет.

      ## ПОРТРЕТ ЦЕЛЕВОЙ АУДИТОРИИ
      {audience_profile}

      ## ТОН ГОЛОСА
      {tone_guide}

      ## РУБРИКАТОР (обязательно используй разные рубрики)
      {rubrics_guide}

      ## ТВОИ ПРАВИЛА
      1. **Одна идея = одна тема, один ракурс.** Не размывай.
      2. **Хук — это первая фраза поста**, которую видно в "свёрнутом" виде VK. Должна быть острой, провокационной или узнаваемой. Не "продающая", а честная.
      3. **Язык ЦА, не маркетинга.** Никаких "узнайте", "попробуйте", "упустите". Пиши как подруга, которая через это прошла.
      4. **Без эзотерики** (вселенная, энергия, карма).
      5. **Без "успешного успеха"** (10 правил, 5 шагов к успеху).
      6. **Без нравоучения** — делись наблюдением, не учи жить.
      7. **CTA — открытый вопрос или мягкое действие**, не "ставьте лайк".
      8. **Если задана рубрика — она должна быть у КАЖДОЙ идеи.** Если не задана — обязательно чередуй рубрики из списка.
      9. **Верни ТОЛЬКО валидный JSON-массив.** Никаких ```json, никаких пояснений до или после.

    # User — конкретный запрос
    user: |
      Сгенерируй РОВНО {count} идей постов для {target_label}.

      **Тема:** {theme}
      **Источник вдохновения:** {source}
      **Рубрика (ОБЯЗАТЕЛЬНО у всех идей):** {rubric}
      **Длина текста:** {length_hint}
      {pains_section}

      ## ДОПОЛНИТЕЛЬНЫЕ ПРАВИЛА КАЧЕСТВА
      - Хук должен звучать как фраза, которую ЦА сама себе говорит (или которую она услышит от подруги).
      - Никаких императивов в хуке: не "узнайте", не "попробуйте", не "представьте".
      - Если тема про навязанные желания — обязателен переход от внешнего ("как все хотят") к внутреннему ("чего хочу я").
      - В key_idea — не пересказ хука, а РАЗВИТИЕ: что именно пост раскроет.
      - reasoning — коротко, 1 предложение, на КАКУЮ ИМЕННО боль из портрета ЦА попадает.
      - Минимум 3 РАЗНЫЕ рубрики в выдаче, даже если задана одна — последние 1-2 идеи могут быть в смежной рубрике.

      ## Формат ответа — JSON-массив
      Каждый объект:
      ```
      {{
        "title": "5-12 слов, цепляет, не кликбейт",
        "hook": "1-2 предложения, первая фраза поста. Без 'узнайте', 'попробуйте', 'вы не поверите'",
        "key_idea": "1-2 предложения, О ЧЁМ пост, не о чём идея в целом",
        "structure_hint": "AIDA | PAS | storytelling | list | howto",
        "rubric": "ОДНА из: разбор-цитаты, детектор, история, провокация, практика, миф-vs-правда, подборка",
        "cta": "1-2 фразы. Вопрос, мягкое действие или 'поделитесь'",
        "target_metric": "комменты | репосты | сохранения | переходы",
        "priority": "high | medium | low",
        "reasoning": "1 предложение, почему сработает (на какую боль ЦА попадает)",
        "notes": "что НЕ писать в этом посте (ограничения, что избегать)"
      }}
      ```

      ## ПРИМЕРЫ В НАШЕМ ТОНЕ (из examples/10-post-pack.md)

      ### ПЛОХО (не наш тон — кликбейт/продажа):
      ```
      {{
        "title": "Узнайте 3 секрета счастья",
        "hook": "Прочитайте эту статью, чтобы стать счастливее!",
        "key_idea": "Расскажем, как стать счастливее за 5 минут.",
        "cta": "Ставьте лайк и подписывайтесь!"
      }}
      ```

      ### ХОРОШО (тон ЛЖ — глубокий, на языке ЦА):
      ```
      {{
        "title": "5 фраз, которые выдают чужое желание",
        "hook": "«Я просто хочу как все» — и почему это красный флаг",
        "key_idea": "Разобрать 5 типичных формулировок, которые маскируют навязанное желание под своё. Через язык — показать разницу.",
        "rubric": "разбор-цитаты",
        "structure_hint": "list",
        "cta": "Какая фраза про вас? Напишите в комментах.",
        "target_metric": "комменты",
        "priority": "high",
        "reasoning": "Попадает в боль «не понимаю, чего хочу», высокий потенциал на комменты (идентификация).",
        "notes": "Без нравоучения, цитата в начале, не превращать в инфостиль."
      }}
      ```

      Ещё пример ХОРОШЕГО:
      ```
      {{
        "title": "«Слушай сердце» — почему это плохой совет",
        "hook": "«Слушай сердце» — самый бесполезный совет для тех, кто не понимает, чего хочет.",
        "key_idea": "Провокация на тему «слушай сердце». Почему не работает, что работает вместо.",
        "rubric": "провокация",
        "structure_hint": "AIDA",
        "cta": "А что вы слышите, когда «слушаете сердце»? Поделитесь.",
        "target_metric": "репосты",
        "priority": "high",
        "reasoning": "Провокация + боль ЦА = репосты. Против мейнстрима, узнаваемо.",
        "notes": "Не агрессивно. Альтернатива обязательна."
      }}
      ```

      Верни ТОЛЬКО JSON-массив. Никаких обёрток ```json, никакого текста до или после.

# === Лимиты ===
limits:
  max_ideas_per_run: 50
  max_history_size: 5000
  archive_after_days: 180
  llm_request_multiplier: 2  # Запрашивать у LLM в N раз больше, чем нужно (на случай невалидных)

# === Конкуренты для мониторинга ===
competitors:
  - id: "pulabru"
    name: "Лаборатория желаний (своё)"
    url: "https://vk.com/pulabru"
    type: "self"
    active: true
  # - id: "competitor-1"
  #   name: "[Название]"
  #   url: "https://vk.com/[адрес]"
  #   type: "direct"  # direct | indirect | books
  #   active: true
  #   fetch_depth: 200

# === Дефолты для генерации ===
defaults:
  target: "vk"
  audience: "ca-zhelanii"
  tone: "B3"
  count: 5
  rubrics:
    - "разбор-цитаты"
    - "детектор"
    - "история"
    - "провокация"
    - "практика"
    - "миф-vs-правда"
    - "подборка"

# === Маппинг target → label и длине ===
target_mapping:
  vk:
    label: "сообщества ВКонтакте"
    length: "800-1500 знаков"
  blog:
    label: "блога на сайте"
    length: "2500-4000 знаков"
  telegram:
    label: "Telegram-канала"
    length: "400-800 знаков"

# === Контент-план ===
calendar:
  posts_per_week: 4
  default_mix: "70%vk,30%blog"
  weekday_rubrics:
    mon: "разбор-цитаты"
    wed: "детектор"
    thu: "история"
    sat: "практика"
