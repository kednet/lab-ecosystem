  - week: 3
    theme: "Present Perfect vs Past Simple — самая частая проблема B1"
    grammar_focus: "present-perfect-vs-past-simple"
    block: "Главная проблема B1"
    why: "Ошибка №1 у русскоязычных B1: 'I have went' вместо 'I have gone' + путаница 'I've been' vs 'I went'. Разводим чётко: опыт vs история."

    days:
      - day: 1
        type: "intro"
        title: "Present Perfect vs Past Simple: ключевое различие"
        content: |
          # Week 3, Day 1: Present Perfect vs Past Simple

          ## Главное правило (запомни первым!)

          | | Past Simple | Present Perfect |
          |---|---|---|
          | **Время** | Конкретное (вчера, в 2020) | Неважно / сейчас актуально |
          | **Маркеры** | yesterday, last week, in 2020, ago | ever, never, just, already, yet, since, for, recently, three times |
          | **Результат** | История | Связь с настоящим |

          ## Простой способ выбрать

          - Есть **дата/время в прошлом** → **Past Simple**
          - Даты нет, важен **результат/опыт** → **Present Perfect**

          ## 10 пар примеров (IT-контекст)

          1. "I **shipped** the hotfix on Monday." (PS — день есть)
             "I'**ve shipped** three hotfixes this week." (PP — результат в текущей неделе)
          2. "I **went** to the office yesterday." (PS — вчера)
             "I'**ve been** to the office three times this week." (PP — опыт на этой неделе)
          3. "**Did you deploy** v2.1?" (PS — конкретный вопрос про прошлое)
             "**Have you ever deployed** a hotfix?" (PP — вопрос про опыт)
          4. "The build **failed** at 14:00." (PS — точное время)
             "The build **has failed** three times today." (PP — результат сейчас)
          5. "We **used** MongoDB in v1." (PS — в прошлом, сейчас нет)
             "We'**ve used** MongoDB since 2018." (PP — действие продолжается)

          ## Формула Present Perfect

          | Местоимение | Форма |
          |---|---|
          | I / You / We / They | **have** + V3 (worked, shipped) |
          | He / She / It | **has** + V3 |

          Сокращения: **I've**, **You've**, **He's** shipped.

          ## Мини-задание: выбери правильное

          1. I ___ (ship / shipped / have shipped) v2.0 last Monday.
          2. I ___ (ship / shipped / have shipped) three releases this month.
          3. We ___ (used / have used / did use) TypeScript since 2020.
          4. She ___ (went / has gone / did go) to the office yesterday.
          5. ___ (Did you / Have you ever) debugged a memory leak?

          **Ответы:**
          1. shipped (PS — last Monday)
          2. have shipped (PP — this month, результат в настоящем)
          3. have used (PP — since 2020, продолжается)
          4. went (PS — yesterday)
          5. Have you ever (PP — опыт)

          ## Vocab дня
          - so far — на данный момент
          - recently — недавно
          - lately — в последнее время
          - just — только что
          - already — уже
          - yet — ещё не (в отрицаниях и вопросах)
        listening: ["bbc-podcast-working-from-home", "voa-everyday-grammar-routines"]
        vocab: ["so far", "recently", "lately", "just", "already", "yet"]

      - day: 2
        type: "grammar"
        title: "Present Perfect: 3 случая использования"
        content: |
          # Week 3, Day 2: Present Perfect — 3 случая

          ## 1. Жизненный опыт (ever / never)

          - "I'**ve been** to London three times."
          - "I'**ve never seen** a memory leak this bad."
          - "**Have you ever worked** with Kubernetes?"

          ## 2. Недавнее событие с результатом (just / already)

          - "I'**ve just deployed** the hotfix."
          - "We'**ve already fixed** the bug."
          - "**Have you finished** the migration yet?"

          ## 3. Действие, начавшееся в прошлом и продолжающееся (since / for)

          - "I'**ve worked** here **since** 2018."
          - "We'**ve used** TypeScript **for** 3 years."
          - "The service **has been** down **for** 2 hours."

          ## 5 IT-примеров на каждый случай

          **Опыт:**
          1. "I'**ve shipped** 50 releases in my career."
          2. "I'**ve never debugged** a race condition this tricky."

          **Недавнее + результат:**
          3. "We'**ve just deployed** v2.1."
          4. "I'**ve already fixed** the critical bug."

          **Продолжающееся:**
          5. "We'**ve used** PostgreSQL **since** 2020."

      - day: 3
        type: "listening"
        title: "BBC: опыт и достижения"
        listening: ["bbc-6min-job-titles"]
        task: |
          Слушай интервью. Выпиши все Present Perfect, которые услышишь:
          - "I'**ve worked** for..."
          - "**Have you ever** ...?"

          ## Comprehension
          1. How many years has the guest worked in tech?
          2. What is their biggest achievement?

      - day: 4
        type: "grammar"
        title: "Мини-разбор: типичные ошибки B1"
        content: |
          # Week 3, Day 4: Типичные ошибки B1

          ## ❌ Частая ошибка #1: I have went

          Правильно: **I have gone** / **I went**

          После **have/has** идёт **V3** (3-я форма глагола):
          - go → went → **gone** (см. references/irregular-verbs.md)
          - see → saw → **seen**
          - do → did → **done**
          - ship → shipped → **shipped** (regular)

          ## ❌ Частая ошибка #2: I have went to London in 2020

          С **конкретным прошлым временем** (in 2020) → **Past Simple**:
          - ❌ "I have went to London in 2020."
          - ✅ "I **went** to London in 2020."
          - ✅ "I'**ve been** to London." (без даты — опыт)

          ## ❌ Частая ошибка #3: Did you ever...?

          С **ever** (когда-либо) → **Present Perfect**:
          - ❌ "**Did you ever go** to London?"
          - ✅ "**Have you ever been** to London?"

          ## Мини-задание: исправь ошибки

          1. ❌ "I have went to Berlin last year." → ?
          2. ❌ "Did you ever debugged a race condition?" → ?
          3. ❌ "I have shipped three releases yesterday." → ?
          4. ❌ "She has went to the meeting." → ?
          5. ❌ "I have worked here in 2020." → ?

          **Ответы:**
          1. ✅ "I **went** to Berlin last year." (last year → PS)
          2. ✅ "**Have you ever debugged** a race condition?" (ever → PP)
          3. ✅ "I **shipped** three releases yesterday." (yesterday → PS)
          4. ✅ "She **has gone** to the meeting." (V3 = gone, не went)
          5. ✅ "I **worked** here in 2020." (in 2020 → PS)

      - day: 5
        type: "dialog"
        title: "Dialog: customer-chat (где уже был сделан Progress)"
        dialog: "customer-chat"

      - day: 6
        type: "quiz"
        title: "Mini-quiz: Present Perfect vs Past Simple"
        quiz: "present-perfect-vs-past-simple"

      - day: 7
        type: "review"
        title: "Review Week 3"
        task: |
          # Week 3 — повторение

          ## Главное правило (выучи наизусть)

          **Past Simple** = конкретное время в прошлом (yesterday, last week, in 2020, ago)
          **Present Perfect** = опыт / результат сейчас (ever, never, just, already, since, for, three times, so far)

          ## 5 фраз на повторение
          1. "I'**ve shipped** 50 releases in my career." (PP — опыт)
          2. "I **shipped** the hotfix on Monday." (PS — день)
          3. "**Have you ever debugged** a memory leak?" (PP — ever)
          4. "She **went** to Berlin in 2020." (PS — in 2020)
          5. "We'**ve used** PostgreSQL **since** 2018." (PP — since)

          Повтори quiz с `--force`. Score ≥ 8 → Block 2 продолжается!

  - week: 4
    theme: "Present Perfect vs Past Simple: закрепление + since/for"
    grammar_focus: "present-perfect-vs-past-simple"
    block: "Главная проблема B1"

    days:
      - day: 1
        type: "grammar"
        title: "Present Perfect: since / for / how long"
        content: |
          # Week 4, Day 1: since / for / how long

          ## Разница

          - **since** + точка времени: since 2018, since Monday, since I joined
          - **for** + период: for 3 years, for 2 hours, for a long time

          ## Шпаргалка

          | since (точка) | for (период) |
          |---|---|
          | since 2018 | for 6 years |
          | since Monday | for 3 days |
          | since 9 AM | for 2 hours |
          | since I started | for a long time |

          ## Вопрос "как давно?"

          - **How long have you worked here?**
          - **I've worked here for 3 years.** (= с какого-то момента в прошлом до сейчас)

          ## 5 IT-примеров

          1. "I'**ve worked** here **for** 3 years."
          2. "We'**ve used** TypeScript **since** 2020."
          3. "The service **has been** down **for** 2 hours."
          4. "**How long have you been** on this team?"
          5. "I'**ve been** a senior engineer **since** January."
        listening: ["voa-everyday-grammar-routines"]

      - day: 2
        type: "grammar"
        title: "For / Since — практика"
        content: |
          # Week 4, Day 2: For / Since — practice

          ## Мини-задание: заполни пропуски

          1. I'**ve worked** here ___ 2018. (since / for)
          2. We'**ve used** this database ___ 5 years. (since / for)
          3. She **has been** a manager ___ last year. (since / for)
          4. The bug **has been** there ___ a long time. (since / for)
          5. I'**ve been** waiting ___ 30 minutes. (since / for)

          **Ответы:**
          1. since (точка)
          2. for (период)
          3. since (точка — last year = 2025)
          4. for (период)
          5. for (период)

          ## Составь свои 5 предложений про себя

          Используя since / for / how long:
          - "I'**ve lived** in Moscow ___ 10 years."
          - "I'**ve worked** in IT ___ 2015."
          - и т.д.

      - day: 3
        type: "listening"
        title: "VOA: повседневная грамматика"
        listening: ["voa-everyday-grammar-routines"]

      - day: 4
        type: "grammar"
        title: "Already / Yet / Just — позиция в предложении"
        content: |
          # Week 4, Day 4: Already / Yet / Just

          ## Позиция

          - **just** — между have/has и V3: "I'**ve just shipped** v2.1."
          - **already** — обычно в конце (утверждение): "I'**ve shipped** it **already**."
          - **already** — между have/has и V3 (акцент): "I'**ve already shipped** it."
          - **yet** — в конце (отрицание/вопрос): "I **haven't shipped** it **yet**."

          ## 5 IT-примеров

          1. "I'**ve just deployed** the hotfix." (= только что)
          2. "We'**ve already fixed** the bug." (= уже)
          3. "**Have you finished** the migration **yet**?" (= ещё нет?)
          4. "I **haven't reviewed** the PR **yet**."
          5. "The tests **have already run**." (= уже)

      - day: 5
        type: "dialog"
        title: "Dialog: standup (с Present Perfect)"
        dialog: "standup"
        task: |
          Пройди диалог ещё раз, теперь в репликах подчёркивай Present Perfect:
          - "I've just finished the migration."
          - "I've already deployed the hotfix."
          - "I haven't seen the new spec yet."

      - day: 6
        type: "quiz"
        title: "Mini-quiz: Present Perfect (since/for/already/yet/just)"
        quiz: "present-perfect"

      - day: 7
        type: "review"
        title: "Review Week 4"
        task: |
          # Week 4 — повторение

          ## Главные маркеры Present Perfect

          | Маркер | Позиция | Пример |
          |---|---|---|
          | ever | вопрос | "Have you **ever** shipped v3?" |
          | never | между have и V3 | "I'**ve never** debugged a race condition." |
          | just | между have и V3 | "I'**ve just** deployed." |
          | already | в конце или между | "I've shipped it **already**." |
          | yet | в конце (отриц./вопрос) | "I haven't shipped it **yet**." |
          | since | + точка времени | "since 2020" |
          | for | + период | "for 3 years" |
          | so far | в конце | "...so far." |
          | recently | между have и V3 | "I've recently deployed..." |
          | three times | в конце | "...three times." |

          🎉 Если ты дошёл до конца Week 4 и quiz scores ≥ 8 — ты закрыл главную B1-проблему!

  # ============================================================
  # БЛОК 3: ТЕКУЩИЕ ЗАДАЧИ И ПЛАНЫ (W5-6)
  # ============================================================

  - week: 5
    theme: "Present Continuous — что происходит сейчас"
    grammar_focus: "present-continuous"
    block: "Текущие задачи и планы"

    days:
      - day: 1
        type: "grammar"
        title: "Present Continuous: правило"
        content: |
          # Week 5, Day 1: Present Continuous

          ## Правило

          | Местоимение | Форма | Пример |
          |---|---|---|
          | I | am working | I **am debugging** the issue. |
          | He / She / It | is working | He **is reviewing** the PR. |
          | You / We / They | are working | We **are shipping** v3. |

          Сокращения: I'm, He's, She's, We're, They're.

          ## Когда используется

          - **Прямо сейчас:** "I'**m debugging** the issue right now."
          - **Временная ситуация:** "We'**re using** the staging server this week."
          - **Тренд/изменение:** "The team **is growing** fast."
          - **Заранее запланированное:** "I'**m meeting** the CTO at 3 PM." (= в календаре)

          ## 5 IT-примеров

          1. "We'**re migrating** to v3 this quarter."
          2. "I'**m reviewing** Maria's PR right now."
          3. "The service **is failing** every 5 minutes."
          4. "He'**s debugging** the memory leak."
          5. "We'**re scaling** to 10,000 RPS this week."
        listening: ["bbc-6min-meetings"]

      - day: 2
        type: "grammar"
        title: "Present Continuous vs Present Simple"
        content: |
          # Week 5, Day 2: PC vs PS

          | | Present Simple | Present Continuous |
          |---|---|---|
          | **Что выражает** | Регулярное / факт | Прямо сейчас / временно |
          | **Маркеры** | usually, always, every day | now, right now, currently, this week |
          | **Пример** | I **work** remotely. | I'**m working** from home today. |

          ## 5 пар

          1. "She **works** on auth." (обычно)
             "She'**s working** on auth this week." (временно)
          2. "We **use** PostgreSQL." (обычно)
             "We'**re using** PostgreSQL for the migration." (сейчас)
          3. "I **review** PRs every morning." (регулярно)
             "I'**m reviewing** Maria's PR right now." (прямо сейчас)
          4. "The service **runs** on port 8080." (всегда)
             "The service **is running** slow today." (временно)
          5. "He **debugs** memory leaks." (обычно)
             "He'**s debugging** a memory leak right now." (сейчас)

      - day: 3
        type: "listening"
        title: "BBC: meetings"
        listening: ["bbc-6min-meetings"]

      - day: 4
        type: "grammar"
        title: "Present Continuous в standup"
        content: |
          # Week 5, Day 4: PC в standup

          Типичные standup-фразы:
          - "**I'm working on** the migration."
          - "**I'm debugging** the API."
          - "**I'm reviewing** PRs."
          - "**I'm stuck on** the auth refactor."

          ## Мини-задание: standup на завтра

          Напиши/расскажи 5 предложений, что ты делаешь прямо сейчас:
          1. "I'm debugging..."
          2. "I'm reviewing..."
          3. "I'm investigating..."
          4. "I'm writing..."
          5. "I'm testing..."

      - day: 5
        type: "dialog"
        title: "Dialog: standup (PC focus)"
        dialog: "standup"

      - day: 6
