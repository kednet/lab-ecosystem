        content: |
          # Week 11, Day 4: Passive в документации

          IT-документация часто использует Passive:
          - "Data **is stored** in PostgreSQL."
          - "Logs **are rotated** every 24 hours."
          - "The API **is called** via HTTPS."
          - "Builds **are triggered** on push to main."
          - "Backups **are taken** daily at 3 AM."

          ## Мини-задание

          Перепиши 5 предложений из IT-документации в Passive:
          - "We store passwords in bcrypt." → "Passwords **are stored** in bcrypt."
          - "The system logs errors to S3." → "Errors **are logged** to S3."
          - ... (3 своих)

