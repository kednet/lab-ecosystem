# 12-недельный курикулум English Skill v1.0
# Фокус: грамматика времён + аудирование + IT/бизнес-лексика
# 20-25 мин/день, ~7 уроков в неделю (5-6 рабочих + 1-2 review)
# Целевой переход: B1 → B2 в рабочем контексте (IT/бизнес)
# Создан для: kfigh

meta:
  level: "B1 → B2"
  goal: "IT/business English"
  daily_minutes: 25
  weeks: 12
  created_for: "kfigh"
  created_at: "2026-06-25"

# === Недельные блоки (краткий обзор) ===
week_summary:
  - weeks: [1, 2]
    block: "База"
    focus: "Present Simple + Past Simple"
    why: "Фундамент делового английского. Без этого не построить более сложные времена."
  - weeks: [3, 4]
    block: "Главная проблема B1"
    focus: "Present Perfect vs Past Simple"
    why: "Ошибка №1 у русскоязычных B1: 'I have went' vs 'I went'. Разводим чётко: опыт vs история."
  - weeks: [5, 6]
    block: "Текущие задачи и планы"
    focus: "Present Continuous + Future (will / going to)"
    why: "Standup-формат: 'I'm debugging' (сейчас) + 'I'll ship' / 'I'm going to refactor' (план)."
  - weeks: [7, 8]
    block: "Контекст в прошлом"
    focus: "Past Continuous + Past Perfect"
    why: "Рассказать историю инцидента: 'I was reviewing when the build failed. I had already merged...'"
  - weeks: [9, 10]
    block: "Условные конструкции"
    focus: "Conditionals (1st + 2nd)"
    why: "Деловые допущения: 'If we ship now, we'll have bugs.' + советы: 'I would refactor this.'"
  - weeks: [11, 12]
    block: "Продвинутые темы"
    focus: "Passive Voice + Reported Speech"
    why: "Чтение IT-документации (passive) + пересказ митингов (reported speech)."

# === Полная программа: 12 недель × 7 дней ===

weeks:
  # ============================================================
  # БЛОК 1: БАЗА (W1-2)
  # ============================================================

  - week: 1
    theme: "Present Simple — основа делового английского"
    grammar_focus: "present-simple"
    block: "База"

    days:
      - day: 1
        type: "intro"
        title: "Знакомство с курикулумом + Present Simple: правило"
        content: |
          # Week 1, Day 1: Знакомство

          Добро пожаловать в English Skill! Это твоя 12-недельная программа
          для перехода с B1 на B2 в рабочем IT/бизнес-контексте.

          **Сегодня разбираем:** Present Simple — самое частое время в работе.

          ## Правило (affirmative)

          | Местоимение | Глагол | Пример |
          |---|---|---|
          | I / You / We / They | work (базовая форма) | I **work** on the API. |
          | He / She / It | works (+ s/es) | She **works** on auth. |

          ## Когда используется

          - **Факты:** "The service **runs** on port 8080."
          - **Регулярные действия:** "I **review** PRs every morning."
          - **Расписания:** "The deploy **happens** at 14:00."
          - **Что делает код/система:** "The script **writes** logs to S3."

          ## 5 IT-примеров

          1. Our API **handles** 1000 requests per second.
          2. The build **runs** on every commit.
          3. He **reports** to the CTO.
          4. We **use** PostgreSQL for the main database.
          5. The hotfix **fixes** the memory leak.

          ## Мини-задание

          Переведи на английский (устно или письменно):
          - Я работаю в команде из 5 человек.
          - Сервис запускается каждый день в 9 утра.
          - Он отвечает за деплой.

          ## Vocab дня
          - to be responsible for — отвечать за
          - to report to — подчиняться
          - to deal with — иметь дело с
        listening: ["bbc-6min-job-titles"]
        vocab: ["be responsible for", "report to", "deal with"]

      - day: 2
        type: "grammar"
        title: "Present Simple: отрицания и вопросы"
        content: |
          # Week 1, Day 2: Present Simple — negative & questions

          ## Отрицание

          | Местоимение | Форма | Пример |
          |---|---|---|
          | I / You / We / They | don't + V | I **don't work** on weekends. |
          | He / She / It | doesn't + V | He **doesn't work** on auth. |

          ## Вопрос

          | Местоимение | Форма | Пример |
          |---|---|---|
          | I / You / We / They | Do + V? | **Do you work** remotely? |
          | He / She / It | Does + V? | **Does he work** on the team? |

          ⚠️ **Важно:** в вопросах и отрицаниях **s/es исчезает**:
          - He works. → He doesn't work. (НЕ ~~doesn't works~~)
          - She runs tests. → Does she run tests? (НЕ ~~Does she runs~~)

          ## 5 IT-примеров (отрицание)

          1. The API **doesn't handle** more than 1000 RPS.
          2. We **don't deploy** on Fridays.
          3. The script **doesn't write** logs to the database.
          4. I **don't review** my own PRs.
          5. The service **doesn't restart** automatically.

          ## 5 IT-примеров (вопросы)

          1. **Does the build run** on every commit?
          2. **Do you deploy** on Fridays?
          3. **Does the API handle** authentication?
          4. **Do you use** TypeScript?
          5. **Does the script write** to S3 or to disk?
        listening: ["voa-everyday-grammar-routines"]

      - day: 3
        type: "listening"
        title: "День рутины: standup-фразы"
        listening: ["bbc-podcast-working-from-home"]
        task: |
          Послушай эпизод BBC и ответь на вопросы ниже устно.
          Потом сверься с sample_answer.

          ## Comprehension questions

          1. What are the three main tips for working from home?
          2. What does the phrase "WFH" stand for?
          3. How does the speaker describe "focus mode"?

          ## Vocab для запоминания
          - remote work — удалённая работа
          - WFH = working from home
          - commute — дорога на работу
          - distraction — отвлечение
          - focus mode — режим сосредоточенности

      - day: 4
        type: "grammar"
        title: "Present Simple: наречия частоты"
        content: |
          # Week 1, Day 4: Наречия частоты

          ## Порядок в предложении

          1. **be** + наречие: She **is always** late.
          2. **другие глаголы**: наречие **перед** глаголом: I **often work** late.

          ## Шкала (от самого частого к редкому)

          always (100%) → usually (80%) → often (60%) → sometimes (30%) → hardly ever (5%) → never (0%)

          ## 5 IT-примеров

          1. We **always run** tests before deploying.
          2. The build **usually takes** 10 minutes.
          3. I **often review** PRs in the morning.
          4. We **sometimes deploy** on Friday afternoons.
          5. Critical bugs **never wait** until Monday.

          ## Мини-задание

          Расставь наречия в правильном месте:
          - We deploy on Fridays. (sometimes)
          - The build fails on Mondays. (always)
          - I review my own PRs. (never)

          Правильные ответы:
          - We **sometimes deploy** on Fridays.
          - The build **always fails** on Mondays.
          - I **never review** my own PRs.

      - day: 5
        type: "dialog"
        title: "Dialog: standup"
        dialog: "standup"
        task: |
          Открой диалог: `python scripts/english.py dialog standup`
          Прочитай facilitator-реплики вслух, потом свои реплики.
          Сверься с model_answer.

      - day: 6
        type: "quiz"
        title: "Mini-quiz: Present Simple"
        quiz: "present-simple"
        task: |
          Пройди мини-тест:
          ```
          python scripts/english.py quiz present-simple
          ```

      - day: 7
        type: "review"
        title: "Review Week 1"
        task: |
          # Week 1 — повторение

          ## Что мы выучили
          - Present Simple: факты, регулярные действия, расписания
          - Форма: I work / He works
          - Отрицание: don't / doesn't + V
          - Вопрос: Do / Does + V?
          - Наречия частоты: always, usually, often, sometimes, hardly ever, never

          ## 5 фраз на повторение (прочитай вслух 3 раза)
          1. "I **work** on the auth service."
          2. "She **doesn't deploy** on Fridays."
          3. "**Do you use** TypeScript?"
          4. "We **always run** tests before deploying."
          5. "The build **usually takes** 10 minutes."

          ## Проверь себя

          Пройди quiz ещё раз:
          ```
          python scripts/english.py quiz present-simple --force
          ```

          Если score ≥ 8/10 — Week 2 разблокирована! 🎉

  - week: 2
    theme: "Past Simple — истории и кейсы"
    grammar_focus: "past-simple"
    block: "База"

    days:
      - day: 1
        type: "grammar"
        title: "Past Simple: правило"
        content: |
          # Week 2, Day 1: Past Simple

          ## Правило

          - **Regular verbs:** V + ed (worked, shipped, fixed)
          - **Irregular verbs:** 2-я форма (go → went, see → saw, ship → shipped... wait, that's regular)
            Полный список — `references/irregular-verbs.md`

          | Местоимение | Форма | Пример |
          |---|---|---|
          | I / You / He / She / It / We / They | V2 (worked / went / saw) | I **shipped** the release on Monday. |

          ## 5 IT-примеров

          1. We **shipped** v2.1 last Friday.
          2. The build **failed** at 14:00.
          3. I **fixed** the memory leak in 2 hours.
          4. She **reviewed** 20 PRs yesterday.
          5. The service **crashed** at 3 AM.

          ## Signal words (маркеры Past Simple)

          yesterday, last week/month/year, ago, in 2020, when I was…
        listening: ["bbc-6min-job-titles"]

      - day: 2
        type: "grammar"
        title: "Past Simple: отрицания и вопросы"
        content: |
          # Week 2, Day 2: Past Simple — negative & questions

          ## Отрицание: didn't + V (базовая форма!)

          ⚠️ **Важно:** после **didn't** идёт **базовая форма**, не V2:
          - I worked. → I **didn't work**. (НЕ ~~didn't worked~~)
          - She went. → She **didn't go**. (НЕ ~~didn't went~~)

          ## Вопрос: Did + V (базовая форма)?

          - **Did** you **work** on the migration? (НЕ ~~Did you worked~~)

          ## 5 IT-примеров

          1. The build **didn't fail** — we caught the bug in CI.
          2. I **didn't deploy** on Friday.
          3. **Did you fix** the memory leak?
          4. **Didn't the tests pass** yesterday?
          5. The service **didn't crash** in production.

      - day: 3
        type: "listening"
        title: "BBC: рассказ о работе мечты"
        listening: ["bbc-6min-job-titles"]
        task: |
          Послушай эпизод. Сфокусируйся на Past Simple в историях:
          - "I **started** my career as..."
          - "I **worked** at Google for 3 years."

          ## Comprehension questions
          1. What was the guest's first job?
          2. Why did they change careers?
          3. What's the difference between "job title" and "position"?

      - day: 4
        type: "grammar"
        title: "Past Simple в IT-нарративе"
        content: |
          # Week 2, Day 4: Past Simple в историях

          Типичная структура IT-нарратива:
          - "We **shipped** v2.0 on Monday."
          - "The build **failed** on Wednesday."
          - "I **investigated** and **found** the root cause."
          - "We **deployed** a hotfix on Friday."

          ## Мини-задание: расскажи историю

          "У нас был инцидент на прошлой неделе. Напиши/расскажи 5 предложений,
          что произошло, что ты сделал, как починил."

          Шаблон:
          - On [day], [what happened].
          - I [action 1].
          - Then I [action 2].
          - We [team action].
          - In the end, [result].

      - day: 5
        type: "dialog"
        title: "Dialog: incident (история инцидента)"
        dialog: "incident"

      - day: 6
        type: "quiz"
        title: "Mini-quiz: Past Simple"
        quiz: "past-simple"

      - day: 7
        type: "review"
        title: "Review Week 2"
        task: |
          # Week 2 — повторение

          ## Past Simple — правило в одном абзаце

          Завершённые действия в прошлом с конкретным временем (yesterday, last week, in 2020).
          Регулярные глаголы: V + ed. Неправильные: 2-я форма (go-went-gone).
          Отрицание: didn't + V (базовая форма). Вопрос: Did + V?

          ## 5 фраз на повторение
          1. "We **shipped** v2.1 last Friday."
          2. "The build **didn't fail**."
          3. "**Did you fix** the memory leak?"
          4. "I **found** the root cause in 2 hours."
          5. "She **reviewed** 20 PRs yesterday."

          Повтори quiz с `--force`. Score ≥ 8 → Block 2 разблокирован!

