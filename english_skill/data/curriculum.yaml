  - week: 8
    theme: "Past Perfect — прошлое в прошлом"
    grammar_focus: "past-perfect"
    block: "Контекст в прошлом"

    days:
      - day: 1
        type: "grammar"
        title: "Past Perfect: правило"
        content: |
          # Week 8, Day 1: Past Perfect

          ## Правило

          **had + V3** для всех местоимений.
          Сокращение: I'd, he'd, she'd, we'd, they'd.

          ## Когда используется

          - Действие, **завершившееся ДО другого действия в прошлом**.
          - «Прошлое в прошлом».

          ## 5 IT-примеров

          1. "I **had already merged** the PR before the build failed."
          2. "She **had finished** the migration by the time we started."
          3. "We **had shipped** three releases by Friday."
          4. "By yesterday evening, the team **had found** the root cause."
          5. "He **had never seen** such a bug before." (= до этого момента в прошлом)
        listening: ["voa-education-report"]

      - day: 2
        type: "grammar"
        title: "Past Perfect + Past Simple"
        content: |
          # Week 8, Day 2: PP + PS

          ## Структура

          - **Past Perfect** = действие, которое произошло РАНЬШЕ (had + V3)
          - **Past Simple** = действие, которое произошло ПОЗЖЕ (V2)

          ## 5 историй

          1. "I **had reviewed** the PR **before** I **merged** it."
          2. "After we **had deployed**, the tests **failed**."
          3. "She **had already left** when the alert **came**."
          4. "By the time we **arrived**, the bug **had been** fixed."
          5. "I **had never written** TypeScript before I joined this team."

          ## Signal words

          before, after, already, by the time, when, by yesterday, by 5pm, never... before

      - day: 3
        type: "listening"
        title: "VOA: Education Report"
        listening: ["voa-education-report"]

      - day: 4
        type: "grammar"
        title: "Past Perfect в нарративе"
        content: |
          # Week 8, Day 4: PP в нарративе

          ## Полная IT-история (PC + PS + PP)

          "On Monday, we **were preparing** to deploy v3. I **had finished** the
          migration script the week before, but we **hadn't tested** it in staging.
          At 14:00, the build **failed**. I **was investigating** when I **noticed**
          that we **had missed** a database migration step. By 16:00, we **had fixed**
          it and **deployed** successfully."

          ## Разбор

          - were preparing (PC — фон)
          - had finished (PP — раньше)
          - hadn't tested (PP отрицание)
          - failed (PS)
          - was investigating (PC — фон)
          - noticed (PS)
          - had missed (PP — раньше)
          - had fixed, deployed (PP + PS — последовательность)

      - day: 5
        type: "dialog"
        title: "Dialog: retro"
        dialog: "retro"

      - day: 6
        type: "quiz"
        title: "Mini-quiz: Past Perfect"
        quiz: "past-perfect"

      - day: 7
        type: "review"
        title: "Review Week 8"

  # ============================================================
  # БЛОК 5: УСЛОВНЫЕ КОНСТРУКЦИИ (W9-10)
  # ============================================================

  - week: 9
    theme: "1st Conditional — реальные условия"
    grammar_focus: "conditional-1st"
    block: "Условные конструкции"

    days:
      - day: 1
        type: "grammar"
        title: "1st Conditional: правило"
        content: |
          # Week 9, Day 1: 1st Conditional (real/likely)

          ## Правило

          **If + Present Simple, will + V**

          - If **condition** (real/likely), **result** (future).
          - If it **rains** tomorrow, I **will stay** home.
          - If we **ship** now, we **will have** bugs.

          ## 5 IT-примеров

          1. "If we **ship** now, we **will have** bugs in production."
          2. "If the tests **pass**, I **will merge** the PR."
          3. "If the build **fails**, we **will roll back**."
          4. "**Unless** we **fix** the memory leak, the service **will crash**."
          5. "If you **push** to main, the CI **will run** automatically."
        listening: ["voa-education-report"]

      - day: 2
        type: "grammar"
        title: "1st Conditional в деловых решениях"
        content: |
          # Week 9, Day 2: 1st в решениях

          ## Шаблон обсуждения рисков

          "If we [decision], then [consequence]."

          - "If we deploy on Friday, we **won't have** time to monitor over the weekend."
          - "If we wait until Monday, we **will lose** 2 days."
          - "If we add more tests, we **will ship** later but with higher quality."

          ## Unless (= if not)

          - "Unless we fix the memory leak, the service will crash."
          - = "If we don't fix the memory leak, the service will crash."

      - day: 3
        type: "listening"
        title: "VOA: Education"
        listening: ["voa-education-report"]

      - day: 4
        type: "grammar"
        title: "1st Conditional — практика"
        content: |
          # Week 9, Day 4: Practice

          ## Мини-задание: допиши предложения

          1. If the build fails, we ___. (roll back)
          2. If you review my PR, I ___. (merge it)
          3. Unless we add tests, the code ___. (will break)
          4. If the user clicks Save, the data ___. (will be saved)
          5. If we don't deploy today, we ___. (won't ship on time)

          **Ответы:**
          1. ...we **will roll back**.
          2. ...I **will merge** it.
          3. ...the code **will break**.
          4. ...the data **will be saved**.
          5. ...we **won't ship** on time.

      - day: 5
        type: "dialog"
        title: "Dialog: estimate (с conditional)"
        dialog: "estimate"

      - day: 6
        type: "quiz"
        title: "Mini-quiz: 1st Conditional"
        quiz: "conditionals-1-2"  # общий файл на 1st+2nd

      - day: 7
        type: "review"
        title: "Review Week 9"

  - week: 10
    theme: "2nd Conditional — гипотетические ситуации"
    grammar_focus: "conditional-2nd"
    block: "Условные конструкции"

    days:
      - day: 1
        type: "grammar"
        title: "2nd Conditional: правило"
        content: |
          # Week 10, Day 1: 2nd Conditional (unreal/hypothetical)

          ## Правило

          **If + Past Simple, would + V**

          - If I **had** more time, I **would refactor** this code.
          - If we **were** using TypeScript, this bug **wouldn't happen**.
          - = Нереальная/маловероятная ситуация в настоящем или будущем.

          ## 5 IT-примеров

          1. "If I **had** more time, I **would refactor** this code."
          2. "If we **were** using TypeScript, this bug **wouldn't happen**."
          3. "What **would** you do if the build **failed** right now?"
          4. "If I **were** the CTO, I **would prioritize** technical debt."
          5. "If we **had** a bigger team, we **would ship** faster."
        listening: ["code-review-podcast"]

      - day: 2
        type: "grammar"
        title: "2nd Conditional в советах и мечтах"
        content: |
          # Week 10, Day 2: 2nd в советах

          ## Структура

          - Совет: "If I **were** you, I **would**..."
          - Мечта: "If we **had** [resource], we **would**..."
          - Предположение: "What **would** happen if..."

          ## 5 IT-примеров

          1. "If I **were** you, I **would add** more tests."
          2. "If we **had** a senior reviewer, we **would ship** faster."
          3. "If we **were** using Kubernetes, this **would be** easier."
          4. "If the code **were** cleaner, this bug **wouldn't have happened**."
          5. "I **would love** to refactor this, but we **don't have** time."

      - day: 3
        type: "listening"
        title: "IT-подкаст: Code review etiquette"
        listening: ["code-review-podcast"]

      - day: 4
        type: "grammar"
        title: "1st vs 2nd Conditional"
        content: |
          # Week 10, Day 4: 1st vs 2nd

          | | 1st Conditional | 2nd Conditional |
          |---|---|---|
          | **If clause** | Present Simple | Past Simple |
          | **Result** | will + V | would + V |
          | **Реальность** | реально / вероятно | нереально / маловероятно |
          | **Пример** | If we **ship** now, we **will have** bugs. | If we **shipped** now, we **would have** bugs. (но мы не шлём) |

          ## Мини-задание: выбери правильное

          1. If we ___ (have) more time, we ___ (would / will) ship v3.
          2. If the tests ___ (pass), I ___ (would / will) merge.
          3. If I ___ (were / am) you, I ___ (would / will) refactor.
          4. Unless we ___ (fix / fixed) the bug, it ___ (would / will) crash.

          **Ответы:**
          1. had, would (2nd — нереально, у нас нет времени)
          2. pass, will (1st — реально)
          3. were, would (2nd — совет)
          4. fix, will (1st — реально)

      - day: 5
        type: "dialog"
        title: "Dialog: push-back (с conditional)"
        dialog: "push-back"

      - day: 6
        type: "quiz"
        title: "Mini-quiz: Conditionals (1st + 2nd)"
        quiz: "conditionals-1-2"

      - day: 7
        type: "review"
        title: "Review Week 10"

  # ============================================================
  # БЛОК 6: ПРОДВИНУТЫЕ ТЕМЫ (W11-12)
  # ============================================================

  - week: 11
    theme: "Passive Voice — фокус на действии, не исполнителе"
    grammar_focus: "passive-voice"
    block: "Продвинутые темы"

    days:
      - day: 1
        type: "grammar"
        title: "Passive Voice: правило"
        content: |
          # Week 11, Day 1: Passive Voice

          ## Правило

          **be + V3** (по времени be)

          - Present: The code **is reviewed** by Maria.
          - Past: The bug **was fixed** yesterday.
          - Present Perfect: The fix **has been deployed**.
          - Future: The hotfix **will be deployed** at 14:00.

          ## Когда используется

          - **Исполнитель не важен:** "The bug was fixed."
          - **Исполнитель неизвестен:** "The data was deleted."
          - **Общий процесс:** "The code is reviewed by 2 engineers."

          ## 5 IT-примеров

          1. "The hotfix **was deployed** at 14:00." (исполнитель не важен)
          2. "This bug **has been fixed** in v2.1." (процесс)
          3. "The build **was broken** by the new migration." (с исполнителем через by)
          4. "The PR **is reviewed** by 2 engineers." (процесс)
          5. "Tests **are run** on every commit." (факт о системе)
        listening: ["developer-voices-standup"]

      - day: 2
        type: "grammar"
        title: "Active vs Passive"
        content: |
          # Week 11, Day 2: Active vs Passive

          ## Трансформация

          - Active: Maria **fixed** the bug.
          - Passive: The bug **was fixed** by Maria.

          - Active: We **ship** releases every Friday.
          - Passive: Releases **are shipped** every Friday.

          ## 5 IT-пар

          1. Maria deployed the hotfix. → The hotfix **was deployed** by Maria.
          2. We review PRs daily. → PRs **are reviewed** daily.
          3. They fixed the bug. → The bug **was fixed**.
          4. He broke the build. → The build **was broken** by him.
          5. We will deploy v3 on Friday. → V3 **will be deployed** on Friday.

