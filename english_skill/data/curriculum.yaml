        title: "Past Continuous в историях инцидентов"
        content: |
          # Week 7, Day 4: PC в инцидентах

          ## Шаблон рассказа об инциденте

          1. **Background (PC):** "We **were migrating** to v3."
          2. **Problem (PS):** "The database **went** down at 14:00."
          3. **Investigation (PC):** "I **was investigating** the logs when..."
          4. **Resolution (PS):** "We **found** the root cause and **fixed** it."
          5. **Aftermath (PP - бонус):** "We'**ve added** monitoring since then."

          ## Мини-задание

          Расскажи историю любого инцидента из своей практики по этому шаблону.
        listening: ["bbc-idioms-time"]

      - day: 5
        type: "dialog"
        title: "Dialog: incident (PC focus)"
        dialog: "incident"

