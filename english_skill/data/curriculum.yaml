        type: "quiz"
        title: "Mini-quiz: Future (will / going to)"
        quiz: "future-will-going"

      - day: 7
        type: "review"
        title: "Review Week 6"

  # ============================================================
  # БЛОК 4: КОНТЕКСТ В ПРОШЛОМ (W7-8)
  # ============================================================

  - week: 7
    theme: "Past Continuous — действие в процессе в прошлом"
    grammar_focus: "past-continuous"
    block: "Контекст в прошлом"

    days:
      - day: 1
        type: "grammar"
        title: "Past Continuous: правило"
        content: |
          # Week 7, Day 1: Past Continuous

          ## Правило

          | Местоимение | Форма | Пример |
          |---|---|---|
          | I / He / She / It | was working | I **was debugging** when the build failed. |
          | You / We / They | were working | We **were migrating** all day yesterday. |

          ## Когда используется

          - **Действие в процессе** в конкретный момент в прошлом.
          - Часто как **фон** для Past Simple: "I was reviewing the PR **when** the build failed."

          ## 5 IT-примеров

          1. "I **was debugging** the memory leak when you called."
          2. "We **were migrating** the database all day yesterday."
          3. "She **was reviewing** PRs at 3 PM."
          4. "The service **was crashing** every 5 minutes."
          5. "While you **were sleeping**, the build was running."
        listening: ["bbc-idioms-time"]

      - day: 2
        type: "grammar"
        title: "Past Continuous + Past Simple (фон + событие)"
        content: |
          # Week 7, Day 2: PC + PS (фон + событие)

          ## Структура

          - **Past Continuous** = фон (что происходило)
          - **Past Simple** = событие (что произошло)
          - Связка: **when** / **while**

          ## 5 IT-историй

          1. "I **was reviewing** the PR **when** the build **failed**."
          2. "**While** we **were deploying**, the database **went** down."
          3. "She **was debugging** when she **noticed** the memory leak."
          4. "The service **was crashing** every minute, so we **restarted** it."
          5. "I **was writing** tests when the CI **broke**."

      - day: 3
        type: "listening"
        title: "BBC: idioms about time"
        listening: ["bbc-idioms-time"]

      - day: 4
