        title: "Mini-quiz: Present Continuous"
        quiz: "present-continuous"

      - day: 7
        type: "review"
        title: "Review Week 5"

  - week: 6
    theme: "Future: will vs going to"
    grammar_focus: "future-will-going"
    block: "Текущие задачи и планы"

    days:
      - day: 1
        type: "grammar"
        title: "Will — спонтанные решения и предсказания"
        content: |
          # Week 6, Day 1: Will

          ## Когда используется

          - **Спонтанное решение** (в момент речи): "The phone is ringing. **I'll** get it."
          - **Предсказание:** "I think it **will** rain tomorrow."
          - **Обещание:** "I **will** send you the report by 5 PM."
          - **Факт о будущем:** "The sun **will** rise at 6 AM."

          ## 5 IT-примеров

          1. "**I'll** cut a release in an hour." (= решение прямо сейчас)
          2. "I think we **will** ship v3 next week." (= предсказание)
          3. "I **will** send you the logs." (= обещание)
          4. "The build **will** fail if we don't fix the test." (= предсказание)
          5. "Don't worry, I **'ll** fix it." (= спонтанное решение)
        listening: ["voa-health-sleep"]

      - day: 2
        type: "grammar"
        title: "Going to — запланированные действия"
        content: |
          # Week 6, Day 2: Going to

          ## Когда используется

          - **План, принятый ДО момента речи:** "I'**m going to review** the PR this afternoon." (= в календаре)
          - **Предсказание на основе признаков:** "Look at the errors — the build **is going to fail**."

          ## Разница

          | | will | going to |
          |---|---|---|
          | **Решение** | в момент речи | заранее |
          | **План** | нет | да |
          | **Предсказание** | мнение/убеждение | на основе фактов |

          ## 5 IT-пар

          1. "**I'll** deploy now." (решение)
             "I'**m going to deploy** at 14:00." (в календаре)
          2. "I think we **will** ship v3." (мнение)
             "We'**re going to ship** v3 on Friday." (план)
          3. "**I'll** check the logs." (спонтанно)
             "I'**m going to check** the logs tomorrow." (план)
          4. "I think the build **will** fail." (мнение)
             "The build **is going to fail** — there are 50 errors." (видно признаки)

      - day: 3
        type: "listening"
        title: "VOA: Health Report"
        listening: ["voa-health-sleep"]

      - day: 4
        type: "grammar"
        title: "Future в деловом контексте"
        content: |
          # Week 6, Day 4: Future в деловых email/чатах

          ## Шаблон письма

          ```
          Hi team,

          Quick update on the migration:

          - We're going to deploy v2.1 on Friday (planned).
          - I'll send the release notes by Thursday.
          - I think we'll hit the deadline.

          Let me know if you have any blockers.
          ```

          ## Мини-задание

          Напиши 3 предложения про свои планы на следующую неделю, используя will и going to.

