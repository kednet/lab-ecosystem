        type: "grammar"
        title: "Reported Speech: правило"
        content: |
          # Week 12, Day 1: Reported Speech

          ## Правило

          Когда пересказываешь чужие слова, сдвигай время назад:
          - Present Simple → Past Simple
          - Present Continuous → Past Continuous
          - Present Perfect → Past Perfect
          - Past Simple → Past Perfect
          - will → would
          - can → could

          ## 5 IT-пар (прямая речь → пересказ)

          1. Maria: "I'm debugging." → He said Maria **was debugging**.
          2. Tom: "I will ship v3." → He said Tom **would ship** v3.
          3. Lisa: "I fixed the bug." → She said Lisa **had fixed** the bug.
          4. Alex: "We have shipped v2." → He said they **had shipped** v2.
          5. PM: "We can deploy on Friday." → She said they **could deploy** on Friday.
        listening: ["soft-skills-engineering"]

      - day: 2
        type: "grammar"
        title: "Say vs Tell"
        content: |
          # Week 12, Day 2: say / tell

          - **say** + (that): "He **said** (that) he was busy." (без объекта-человека после)
          - **tell** + someone + (that): "He **told me** (that) he was busy." (с объектом)

          ## 5 IT-примеров

          1. He **said** the build failed.
          2. He **told me** the build failed.
          3. She **said** she would deploy v3.
          4. She **told the team** she would deploy v3.
          5. They **said** they had shipped v2.

      - day: 3
        type: "listening"
        title: "Soft Skills Engineering"
        listening: ["soft-skills-engineering"]

