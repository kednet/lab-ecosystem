        content: |
          # Week 12, Day 4: Reported Speech в митингах

          ## Шаблон пересказа митинга

          "At the standup, Maria **said** she **was debugging** the auth issue.
          Tom **mentioned** that he **had finished** the migration. The PM **told** us
          we **could deploy** v3 on Friday. Alex **said** he **would review** the PR
          by EOD."

          ## Мини-задание

          Перескажи любой недавний митинг/разговор по этому шаблону (5-7 предложений).

