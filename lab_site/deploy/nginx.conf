# deploy/nginx.conf
#
# Конфиг Nginx для VPS Reg.ru (Москва-2).
#   - отдаёт статику из /var/www/lab-site/dist (Astro build)
#   - проксирует API-запросы на Node.js воркер (127.0.0.1:8787)
#   - TLS от Let's Encrypt
#
# Копируется на VPS: /etc/nginx/sites-available/lab-site
# Активируется:     ln -sf /etc/nginx/sites-available/lab-site /etc/nginx/sites-enabled/
#                   rm -f /etc/nginx/sites-enabled/default
#                   nginx -t && systemctl reload nginx
#
# TLS выпускается: certbot --nginx -d app.pulab.online -d api.pulab.online -d pulab.online
# (certbot сам впишет ssl_certificate пути)

# ── Редирект HTTP → HTTPS (один раз, для всех доменов) ──
server {
    listen 80;
    listen [::]:80;
    server_name app.pulab.online api.pulab.online pulab.online www.pulab.online;

    # Разрешаем ACME-challenge от Let's Encrypt (certbot использует /.well-known/acme-challenge/)
    location /.well-known/acme-challenge/ {
        root /var/www/lab-site/acme;
    }

    location / {
        return 301 https://app.pulab.online$request_uri;
    }
}

# ── Map для WebSocket upgrade (используется в /chief/ws/ ниже) ──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Главный сервер: app.pulab.online и pulab.online (фронт) ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.pulab.online pulab.online www.pulab.online;

    # ── TLS (Let's Encrypt / certbot вписывает автоматически) ──
    ssl_certificate     /etc/letsencrypt/live/app.pulab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.pulab.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Безопасность ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Логи ──
    access_log /var/log/nginx/lab-site.access.log;
    error_log  /var/log/nginx/lab-site.error.log warn;

    # ── Корень — собранный Astro ──
    root /var/www/lab-site/dist;
    index index.html;

    # ── Сжатие ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json
               application/xml+rss application/atom+xml image/svg+xml font/woff2;

    # ── Кэш для бандлей Astro (имена с хешем → immutable) ──
    location ~* ^/_astro/.*\.(woff2|css|js|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Кэш для картинок/шрифтов в /fonts/ ──
    location ~* \.(woff2|woff|ttf|jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Chief Agent API (внутренний VPS-сервис, порт 7070) ──
    # Должен идти ПЕРЕД общим /api правилом, иначе nginx перехватит.
    location /chief/api/ {
        proxy_pass         http://127.0.0.1:7070/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-User            $http_x_user;
        proxy_read_timeout 300s;       # book generation может идти 30+ мин
        proxy_send_timeout 60s;
    }

    # ── Chief Agent WebSocket (Kednet-агент → Chief, порт 7070 /ws) ──
    # Persistent connection с Kednet (ноут kfigh), до 86400 сек.
    location /chief/ws/ {
        proxy_pass         http://127.0.0.1:7070/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;           # сутки на reconnect
        proxy_send_timeout 86400s;
    }

    # ── Telegram webhook (TG → Chief, без авторизации, с secret-token) ──
    # Должен идти ПЕРЕД общим /chief/api/ (он там попадёт, но TG-секрет
    # проверяется на стороне Chief по X-Telegram-Bot-Api-Secret-Token header,
    # не по Bearer-токену).
    location = /chief/api/tg/webhook {
        proxy_pass         http://127.0.0.1:7070/api/tg/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host                            $host;
        proxy_set_header   X-Real-IP                       $remote_addr;
        proxy_set_header   X-Forwarded-For                 $proxy_add_x_forwarded_for;
        proxy_set_header   X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
        proxy_read_timeout 30s;
    }

    # ── API-пути → reverse_proxy на Node.js воркер ──
    location ~ ^/(auth|tracker|generate|books|social|notifications|internal|api|health) {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── robots.txt, sitemap.xml — отдаём как статику ──
    location = /robots.txt { access_log off; }
    location = /sitemap.xml { access_log off; }

    # ── Всё остальное — статика (Astro pages) ──
    location / {
        # Попробовать: файл → каталог+index.html → SPA-fallback на /index.html
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # ── 404 — отдаём красивую страницу Astro (404.astro), если есть ──
    error_page 404 /index.html;
}

# ── api.pulab.online — алиас на основной воркер ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.pulab.online;

    ssl_certificate     /etc/letsencrypt/live/app.pulab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.pulab.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    access_log /var/log/nginx/lab-api.access.log;
    error_log  /var/log/nginx/lab-api.error.log warn;

    location / {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
