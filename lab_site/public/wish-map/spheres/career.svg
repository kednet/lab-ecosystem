<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#3b82f6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <g opacity="0.35" fill="none" stroke="#3b82f6" stroke-width="1.5">
    <circle cx="400" cy="400" r="180"/>
    <circle cx="400" cy="400" r="260" opacity="0.7"/>
    <circle cx="400" cy="400" r="340" opacity="0.5"/>
  </g>

  <g opacity="0.20" fill="#3b82f6">
    <circle cx="220" cy="200" r="60"/>
    <circle cx="620" cy="220" r="40"/>
    <circle cx="600" cy="620" r="50"/>
    <circle cx="180" cy="600" r="30"/>
  </g>

  <g transform="translate(336 336) scale(1)">
    <text x="0" y="0" font-size="128" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, sans-serif">🚀</text>
  </g>

  <text x="400" y="580" text-anchor="middle" font-family="Manrope, system-ui, sans-serif" font-size="34" font-weight="700" fill="#1f0a14">Карьера и обучение</text>
</svg>