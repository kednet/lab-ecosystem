    # 301 редиректы (сделано 13.06.2026 в рамках переезда /tracker/ → /wish-map/ и /g/ → /library/)
    location = /tracker/  { return 301 /wish-map/; }
    location = /g/        { return 301 /library/; }

    # Статические HTML-страницы, которые раньше уходили в API прокси (→ 401/404).
    # Nginx `location =` имеет приоритет над `location ~` — статика отдаётся напрямую,
    # а API endpoints (типа /tracker/wishes, /auth/me) продолжают проксироваться ниже.
    location = /auth/      { try_files $uri $uri/ $uri.html /index.html; }
    location = /wish-map/  { try_files $uri $uri/ $uri.html /index.html; }
    location = /generate/  { try_files $uri $uri/ $uri.html /index.html; }
    location = /checkout/  { try_files $uri $uri/ $uri.html /index.html; }

