# Хэштеги для анонсов Лаборатории желаний
# Формат: 1-2 базовых (бренд) + 1-2 тематических (боль/тема) + 1-2 нишевых
# Источник: стратегия 2026-06-16, аудит хэштегов после правки
# Используется: scripts/post_vk.py, scripts/post_telegram.py (TODO)

# === БАЗОВЫЕ (всегда, иначе потеря бренда) ===
brand:
  - "#лабораторияжеланий"            # TG-формат (без подчёркивания — устоялось)
  - "#лаборатория_желаний"           # VK-формат (с подчёркиванием, устоялось)

# === БОЛИ (что ищет ЦА — женщины 25-55) ===
# Эти подставляются ВЫБОРОЧНО по теме поста, не все сразу.
pain:
  - "#незнаючехочу"                  # «не понимаю, чего хочу»
  - "#хочунасамомделе"               # «отличить хочу от надо»
  - "#навязанныежелания"             # «чьи это желания — мои или чужие»
  - "#чужиеожидания"                 # синоним предыдущего
  - "#надоелонадо"                   # «устала жить для других»
  - "#хватитжитьдлядругих"           # усиление
  - "#отложеннаяжизнь"               # «синдром отложенной жизни»
  - "#жизньнапотом"                  # синоним
  - "#немогуначать"                  # прокрастинация
  - "#прокрастинация"                # то же, классика
  - "#бросаюцели"                    # «бросаю через 2 недели»
  - "#силаволи"                      # «нет силы воли»
  - "#тревожность"                   # «накрыло»
  - "#паническиеатаки"               # узкая тревожность
  - "#женскаясамооценка"             # «я не такая»
  - "#отношениясмужем"               # отношения
  - "#деньгииженственность"          # деньги + женственность
  - "#внутреннийкритик"              # «голос в голове»
  - "#перфекционизм"                 # «всё или ничего»

# === ТЕМАТИКА (что это — книга, конспект, инструмент) ===
topic:
  - "#книги"                         # общий, всегда
  - "#конспектыкниг"                 # формат
  - "#саморазвитие"                  # общий (есть конкуренция, но ёмко)
  - "#психология"                    # общий, без него плохо ищется
  - "#книгипопсихологии"             # узкая альтернатива
  - "#личностныйрост"                # англ. self-improvement по-русски
  - "#самопознание"                  # ближе к теме
  - "#коучинг"                       # аккуратно — не «коуч», а «коучинг» (принципы)
  - "#аудио"                         # для аудио-формата
  - "#аудиокнига"                    # то же
  - "#картажеланий"                  # для визуального формата

# === НИШЕВЫЕ (по конкретной теме поста, добавлять 1-2) ===
niche:
  - "#квантоваяфизика"               # Зеланд-тематика (ТОЛЬКО если пост про Трансерфинг)
  - "#трансерфинг"                   # то же
  - "#когнитивныеискажения"          # Канеман
  - "#поведенческаяэкономика"        # Канеман
  - "#принятиерешений"               # Канеман
  - "#детекциялжи"                   # Экман
  - "#языктела"                      # Экман/Пиз
  - "#смыслжизни"                    # Франкл
  - "#логотерапия"                   # Франкл
  - "#внутренняяигра"                # Мужицкая
  - "#любовьксебе"                   # Мужицкая
  - "#эмоциональныйинтеллект"        # Гоулман

# === АНТИ-ПАТТЕРН (НЕ ИСПОЛЬЗОВАТЬ) ===
# Почему:
#  - слишком общие → тонут в ленте
#  - академические → не язык ЦА
#  - дубли → размывают охват
deprecated:
  - "#метафизика"                    # академич., пугает
  - "#мотивация"                     # 100к+ постов, тонет
  - "#успех"                         # то же
  - "#отношения"                     # слишком общий
  - "#управлениереальностью"         # Зеланд-специфика
  - "#пространствовариантов"         # то же
  - "#варианты"                      # пустой
  - "#визуализация"                  # узкий, не боль
  - "#интуиция"                      # абстрактно
  - "#аналитика"                     # не про ЦА
  - "#деньги"                        # дубль с финансами
  - "#финансы"                       # дубль
  - "#выбор"                         # дубль
  - "#решения"                       # дубль
  - "#привычки"                      # 100к+ постов
  - "#реальность"                    # философски
  - "#мышление"                      # академич.
  - "#самооценка"                    # дубль с женской самооценкой
  - "#цели"                          # общий, есть цельнее
  - "#мотивация"                     # дубль
  - "#конспекты"                     # дубль с конспектыкниг
  - "#трансерфингреальности"         # длинный, не ищут
