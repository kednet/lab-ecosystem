# nginx-сниппет для партнёрских редиректов Литрес
# Подключение: include /var/www/lab-site/affiliate_nginx.conf;  в server {} app.pulab.ru
#
# Генерируется автоматически из lab_site/src/data/books.json:
#   python affiliate_links/build_nginx_map.py --out-dir /var/www/lab-site
#
# Зависимости: в http {} ДО этого файла должны быть определены map-блоки
# (см. affiliate_nginx_http.conf в той же папке).

# Если slug не найден в map → редиректим на главную /library/
location = /go/litres/ { return 302 /library/; }
location = /go/litres  { return 302 /library/; }

# /go/litres/<slug>/ → 302 на партнёрский URL
location ~ "^/go/litres/([^/]+)/?$" {
    set $aff_slug $1;
    if ($aff_litres_path = "") { return 302 /library/; }
    return 302 "https://www.litres.ru$aff_litres_path$aff_litres_query";
}