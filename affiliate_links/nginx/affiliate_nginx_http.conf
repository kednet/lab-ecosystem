# nginx http-блок для партнёрских редиректов Литрес.
# Вставить ДО блоков server {} в /etc/nginx/nginx.conf (или инклуд в conf.d).
#
# Эти map-файлы генерируются автоматически:
#   python affiliate_links/build_nginx_map.py --out-dir /var/www/lab-site

map $aff_slug $aff_litres_path {
    default "";
    include /var/www/lab-site/nginx/affiliate_map.conf;
}

map $aff_slug $aff_litres_query {
    default "";
    include /var/www/lab-site/nginx/affiliate_map_query.conf;
}