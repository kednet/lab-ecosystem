# Скрипт №1: «Золотые правила исполнения желаний»
# Источник: «Скрипты для аудио.pdf» (kfigh, 2026-06-11)
# Зона: голова-сердце-тело | Жанр: объясняющий (по классификации предисловия)
# Адаптировано: 2026-06-11 через LLM-адаптер
#   - тон: warm_mentor (тёплый учитель)
#   - конкретные цифры/даты/имена → универсальные формулировки
#   - шёпот в интро и аутро
#   - паузы: между правилами 1.5s, перед аутро 2s

slug: zolotye-pravila
title: Золотые правила исполнения желаний
description: 5 главных правил, которые превращают мечты в реальность. Правила направленности на себя, настоящего времени, без частицы «не», конкретики и мурашек.
duration_target: 180                # секунд, как в шапке PDF
duration_tolerance: 15              # ±15 сек допустимо

# === Голос и фон ===
voice: jane                          # женский, премиум, мягкий (медитативный)
background: bowls_low                # поющие чаши, тихо
music_intro: 5s
music_outro: 6s

# === Тон повествования (для LLM-адаптера при пересборке) ===
tone: warm_mentor                    # тёплый, в настоящем времени, с уважением
pov: second_person                   # обращение к слушателю на «ты»
language: ru-RU
remove_concrete_examples: true       # убираем «100 тысяч к марту 2027»
preserve_structure: true             # сохраняем «правило N» как нумерованные блоки

# === Транскрипт с мета-метками ===
# Парсер читает [МЕТКА: параметр] и преобразует в SSML-разметку.
# Скилл сам расставит <break time="..."/> по pauses.

script: |
  [МУЗЫКА: тихо, 5 секунд, затем затихает]

  [ШЁПОТ:30%]
  Здравствуй, дорогой друг. Это «Лаборатория желаний».
  [ШЁПОТ:off]
  Сегодня я хочу напомнить тебе о самых главных правилах,
  которые превращают мечты в реальность.

  [ПАУЗА:2s]

  Правило первое. Желание должно быть направлено на себя.
  Мы не можем загадывать за других — за мужа, детей, родителей.
  Это нарушает их свободу воли. Только про себя, только о себе.

  [ПАУЗА:1.5s]

  Правило второе. Формулируй в настоящем времени.
  Не «я буду», а «я есть». Не «я хочу», а «я имею».
  Потому что «я буду» признаёт, что сейчас этого нет.
  А подсознание слышит только то, что есть прямо сейчас.

  [ПАУЗА:1.5s]

  Правило третье. Никакой частицы «не».
  Мозг её просто не слышит.
  Вместо «не болеть» говори «быть здоровым».
  Вместо «не быть одной» — «я в счастливых отношениях».

  [ПАУЗА:1.5s]

  Правило четвёртое. Максимальная конкретика.
  Не «хочу денег», а «получаю столько-то в месяц к такой-то дате».
  Не «хочу путешествовать», а «лечу в конкретное место на конкретные даты».
  Чем яснее картинка — тем быстрее вселенная её увидит.

  [ПАУЗА:1.5s]

  Правило пятое. Желание должно вызывать мурашки.
  Это главный маркер истинности.
  Если внутри откликается тепло и радость — это твоё.
  Если оставляет равнодушной — не трать время.

  [ПАУЗА:2s]

  И последнее, самое важное.
  Благодарность — это топливо исполнения.
  Каждый вечер находи десять поводов сказать спасибо этому дню.
  Даже за мелочи. Особенно за мелочи.

  [ПАУЗА:2s]

  Сегодня попробуй прожить этот день, помня об этих правилах.
  А завтра мы поговорим о чём-то ещё.

  [ШЁПОТ:30%]
  Благодарю тебя, что ты есть. До встречи.
  [ШЁПОТ:off]

  [МУЗЫКА: чуть громче, затем затихает до конца]

# === Паузы по умолчанию (если [ПАУЗА:X] не указана в скрипте) ===
pauses:
  default: 1s
  between_paragraphs: 1s
  between_rules: 1.5s
  before_outro: 2s

# === SSML-параметры (применяются ко всему треку) ===
ssml:
  prosody:
    rate: 0.9                          # чуть медленнее для медитативности
    pitch: 0
    volume: medium
  whisper:
    enabled_in: [intro_greeting, outro_farewell]
    strength: 30                       # % от полной громкости

# === Метаданные для Astro-страницы ===
meta:
  category: правила
  tags: [желания, правила, исполнение, благодарность, осознанность]
  target_audience: те, кто формулирует желания и хочет структуру
  recommended_at: [morning, evening]
  zone: голова-сердце-тело
  source_pdf: "Скрипты для аудио.pdf"
  source_script_id: 1
  has_concrete_examples: false        # уже убраны адаптером

