# Микро-CTA: открытый вопрос в конце аудио-трека.
# Подключается через `data/library/<slug>.yaml`:
#   micro_cta_question: "Какой был самый яркий момент в практике?"
#   micro_cta_url: "/my-experiment/"
# Вставляется перед outro, тон — открытый вопрос, без шёпота (его добавит outro).
# Длительность блока — 10-15 секунд.
# Тон: тёплый, без давления, приглашение. Не "сделай обязательно", а "если решишься".

# Шаблон с плейсхолдером {question}
# В micro_cta_question НЕ ставить знаки вопроса в конце (добавляется автоматически).
# Длина вопроса: 7-15 слов (иначе TTS растягивает блок дольше 15 сек).
# URL сайта НЕ проговаривается: узнать про форму можно в описании/карточке трека.
micro_cta: |
  [ПАУЗА:2s]

  [ВДОХ]

  Мой вопрос к тебе после этой практики: {question}

  [ПАУЗА:2s]

  [ПАУЗА:1s]
