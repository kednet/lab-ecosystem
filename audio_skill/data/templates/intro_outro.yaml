# Стандартное приветствие/прощание для всех аудио-треков
# Применяется через scripts/llm_adapt.py: --template=intro_outro_v1

# Шаблонное интро (заменяет первые 2-3 предложения в каждом скрипте)
# Использует [ШЁПОТ:30%] для тёплого вступления
# {setting_line} — LLM-фраза про книгу (8-15 слов), генерится в llm_adapt.py.
# Если пустая — берётся дефолт «Сегодня у нас новая практика».
intro: |
  [Мягкая, спокойная музыка на фоне, 5 секунд, затем затихает]
  [ШЁПОТ:30%]
  Здравствуй.
  [ШЁПОТ:off]
  [ВДОХ]
  Это «Лаборатория желаний».
  [ПАУЗА:1s]
  {setting_line}
  [ПАУЗА:2s]

# Шаблонное аутро (добавляется в конец script перед музыкальной отбивкой)
# Также в шёпоте, для интимности
outro: |
  [ПАУЗА:1.5s]
  [ВДОХГЛУБ]
  [ШЁПОТ:30%]
  Продолжай экспериментировать. Всё возможно.
  [ШЁПОТ:off]
  До новых встреч.
  [Музыка становится чуть громче, затем затихает до конца]
