# Сфера: Духовность / Осознанные практики
# NB: в каталоге WL нет книг про духовность напрямую.
#     Связь косвенная через книги про смысл, осознание, исполнение.

sphere:
  id: spiritual
  name: Духовность и осознанность
  description: Смысл, ценности, внутренний стержень, медитация, осознанные практики
  icon: 🧘
  color: "#8b5cf6"
  order: 5

source_books:
  - slug: frankl-skazat-zhizni-da         # Сказать жизни Да — Франкл
    relevant_chapters: []
    note: "прямая связь: смысл жизни и внутренний стержень"
  - slug: goddard-sila-osoznaniya          # Сила осознания
    relevant_chapters: []
    note: "прямая связь: сила осознания"
  - slug: goddard-chuvstvo-eto-sekret      # Чувство — это секрет
    relevant_chapters: []
    note: "прямая связь: эмоциональная осознанность"
  - slug: transerfing-realnosti            # Трансерфинг реальности
    relevant_chapters: []
    note: "косвенная связь через управление реальностью"

subsphere_hints:
  - meditation: медитация (ежедневная практика, ретриты, приложения)
  - values: ценности (определить, пересмотреть, жить по ним)
  - meaning: смысл (миссия, жизненные вопросы, дневник)
  - gratitude: благодарность (дневник благодарности, ритуалы)
  - mindfulness: осознанность (в еде, прогулке, работе)
  - practice: практика (йога, цигун, дыхание)
