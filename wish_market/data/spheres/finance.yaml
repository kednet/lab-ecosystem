# Сфера: Финансы
# NB: в каталоге WL нет книг по финансам/инвестициям.
#     Связь косвенная через книги про мышление, дисциплину, достижение целей.

sphere:
  id: finance
  name: Финансы
  description: Доход, накопления, инвестиции, финансовая грамотность
  icon: 💰
  color: "#f59e0b"
  order: 3

source_books:
  - slug: templar-pravila-dostizheniya-tseli  # Правила достижения цели
    relevant_chapters: []
    note: "косвенная связь через достижение финансовых целей"
  - slug: trunin-ra-ot-mechty-do-uspekha     # От мечты до успеха
    relevant_chapters: []
    note: "косвенная связь через путь от мечты к результату"
  - slug: daniel-kaneman-dumay-medlenno-reshay-bystro  # Думай медленно
    relevant_chapters: []
    note: "косвенная связь через принятие финансовых решений"

subsphere_hints:
  - income: увеличение дохода (фриланс, повышение, новый навык)
  - savings: накопления (подушка, % от дохода, цель)
  - investing: инвестиции (акции, облигации, фонды)
  - budget: бюджет (учёт, оптимизация, контроль)
  - debt: долги (закрытие кредитов, рефинансирование)
  - literacy: финансовая грамотность (книги, курсы, консультант)
