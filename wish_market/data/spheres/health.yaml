subsphere_hints:
  - sport: физическая активность (бег, зал, йога, плавание)
  - food: питание (режим, готовка, отказ от сахара)
  - sleep: сон (режим, качество, длительность)
  - mental: ментальное здоровье (медитация, дневник, терапия)
  - habits: привычки (утренние ритуалы, отслеживание)
  - prevention: профилактика (чекапы, врачи, анализы)
